<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oportunidade Tatuapé - Terreno</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .post {
      width: 100%;
      max-width: 500px; /* tamanho aproximado de post quadrado Instagram */
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      border: 10px solid #000;
    }

    .images {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .images img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      padding: 2.5rem 1.8rem;
      text-align: center;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
    }

    .badge {
      display: inline-block;
      background: #ef4444;
      color: white;
      font-weight: bold;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 0.8rem;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 1.8rem;
      color: #fbbf24;
      margin: 1rem 0;
      font-weight: bold;
    }

    .price {
      font-size: 3.4rem;
      font-weight: 900;
      color: #60a5fa;
      margin: 1.2rem 0;
      text-shadow: 0 0 15px rgba(96,165,250,0.5);
    }

    .small {
      font-size: 1.3rem;
      opacity: 0.9;
      margin-top: 0.5rem;
    }

    @media (min-width: 500px) {
      .post {
        max-width: 1080px;
        border-radius: 28px;
        border-width: 16px;
      }

      .images {
        flex-direction: row;
      }

      .images img {
        width: 50%;
      }

      h1 { font-size: 4.2rem; }
      .subtitle { font-size: 2.8rem; }
      .price { font-size: 5.5rem; }
      .small { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="post">

    <div class="images">
      <img src="fotofrente.jpg" alt="Foto frontal do terreno">
      <img src="vistaaerea.png" alt="Vista aérea do terreno">
    </div>

    <div class="content">
      <div class="badge">OPORTUNIDADE ÚNICA!</div>
      <h1>TATUAPÉ</h1>
      <div class="subtitle">VALOR ABAIXO DO MERCADO</div>
      <div class="price">R$ 3.600/m²</div>
      <p class="small">(comissão inclusa) – Terreno 172m² – Rua sem saída</p>
    </div>

  </div>

</body>
</html>
